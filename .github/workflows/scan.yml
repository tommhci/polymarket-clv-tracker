# Polymarket CLV Scanner — Automated cloud execution via GitHub Actions
# Runs every 30 minutes, stores results in SQLite, commits data back to repo.
# Free tier: 2000 min/month → this uses ~720 min/month (well within limit).

name: Polymarket Scan

on:
  schedule:
    # Every 30 min — the SmartScheduler inside main.py decides whether to
    # actually do anything. Runs at :07 and :37 to avoid GitHub high-load at :00.
    # Most runs will exit in <2s with "skip" (no active match window).
    # Full scans (with news + GLM) only fire at T-24h, T-1h, halftime, T-ft.
    # Estimated Actions usage: ~80% reduction vs naive 30-min full scan.
    - cron: '7,37 * * * *'
  workflow_dispatch:  # Manual trigger (always runs full scan regardless of scheduler)

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push DB updates back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner + generate status report
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
          python main.py --report
          python -c "import dashboard; dashboard.export_all()"

      - name: Commit updated CSV data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/data.csv docs/scans.csv docs/paper_trades.csv STATUS.md || true
          git diff --cached --quiet || git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
