# Polymarket CLV Scanner — Automated cloud execution via GitHub Actions
# Runs every 30 minutes, stores results in SQLite, commits data back to repo.
# Free tier: 2000 min/month → this uses ~720 min/month (well within limit).

name: Polymarket Scan

on:
  schedule:
    # Every 30 min, OFFSET from the top of the hour (:07 and :37).
    # GitHub delays/drops scheduled jobs during high load, worst at :00.
    # Source: GitHub docs + crontap.com (Dec 2025). Offset reduces drop rate
    # but does NOT eliminate it — treat the schedule as best-effort, not exact.
    - cron: '7,37 * * * *'
  workflow_dispatch:  # Manual trigger button in GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push DB updates back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add polymarket_tracker.db || true
          git diff --cached --quiet || git commit -m "data: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push || true
